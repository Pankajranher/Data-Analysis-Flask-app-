<!doctype html>
<html>
  <head>
    <title>Upload CSV</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
        width: 350px;
      }

      h1 {
        margin-bottom: 20px;
        color: #333;
      }

      input[type="file"] {
        margin: 20px 0;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        width: 100%;
      }

      button {
        width: 100%;
        padding: 12px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #764ba2;
      }

      .icon {
        font-size: 40px;
        margin-bottom: 10px;
      }

      p {
        color: #777;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Upload CSV</h1>
      <p>Select your sales data file to analyze</p>

      <form action="/upload" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required />
        <button type="submit">Upload & Analyze</button>
      </form>
    </div>
  </body>
</html>
